name: Adapter Request
description: Request a Chat SDK adapter for a new platform or state backend
title: "I want to request a new adapter..."
labels: ["enhancement"]
body:
  - type: input
    id: platform
    attributes:
      label: Platform name
      placeholder: e.g., Discord, Telegram, MongoDB
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Adapter type
      options:
        - Platform adapter (chat platform integration)
        - State adapter (storage backend)
    validations:
      required: true

  - type: input
    id: api-docs
    attributes:
      label: Platform API documentation
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you want this adapter? What would you build with it?
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement and maintain this adapter
          required: false
