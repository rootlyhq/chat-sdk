version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    labels: ["dependencies"]

  - package-ecosystem: "bundler"
    directories:
      - "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/docs-site"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
