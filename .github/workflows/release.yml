name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test before release

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "4.0.6"
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec chat_sdk/spec chat_sdk-slack/spec chat_sdk-teams/spec chat_sdk-gchat/spec chat_sdk-mattermost/spec

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          GEM_VERSION=$(ruby -r ./chat_sdk/lib/chat_sdk/version.rb -e 'puts ChatSDK::VERSION')
          if [ "$TAG_VERSION" != "$GEM_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match ChatSDK::VERSION ${GEM_VERSION}"
            exit 1
          fi

      - name: Build all gems
        run: |
          for dir in chat_sdk chat_sdk-slack chat_sdk-teams chat_sdk-gchat chat_sdk-mattermost chat_sdk-state-redis; do
            (cd "$dir" && gem build *.gemspec)
          done

      - name: Upload gem artifacts
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c5c9c6224401568a2eb6f # v4.6.2
        with:
          name: gems
          path: "**/*.gem"

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - gem: chat_sdk
            oidc_role: rg_oidc_akr_h5zt1b2vxjpbh39dv1r1
          - gem: chat_sdk-slack
            oidc_role: rg_oidc_akr_fof4nb7wscj4bah6gmnm
          - gem: chat_sdk-teams
            oidc_role: rg_oidc_akr_vxtk14tyjnkf8sr86p93
          - gem: chat_sdk-gchat
            oidc_role: rg_oidc_akr_tqje224vokp6nmhyc5xk
          - gem: chat_sdk-mattermost
            oidc_role: rg_oidc_akr_rggsmpj2soty2ssvpwvp
          - gem: chat_sdk-state-redis
            oidc_role: rg_oidc_akr_61jy7b6zrf86kjana7p4

    name: "Publish ${{ matrix.gem }}"

    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: gems

      - name: Configure RubyGems OIDC
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0
        with:
          role-to-assume: ${{ matrix.oidc_role }}

      - name: Publish ${{ matrix.gem }}
        run: gem push ${{ matrix.gem }}/*.gem

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: gems

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8c5b922c329f01 # v2.2.1
        with:
          generate_release_notes: true
          files: "**/*.gem"
