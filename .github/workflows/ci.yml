name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
        gem:
          - chat_sdk
          - chat_sdk-slack
          - chat_sdk-teams
          - chat_sdk-gchat

    name: "${{ matrix.gem }} / Ruby ${{ matrix.ruby }}"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # v1.99.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec ${{ matrix.gem }}/spec

  test-state-redis:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    name: "chat_sdk-state-redis / Ruby ${{ matrix.ruby }}"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # v1.99.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec chat_sdk-state-redis/spec
        env:
          REDIS_URL: redis://localhost:6379

  build-and-test:
    runs-on: ubuntu-latest
    needs: [test, test-state-redis]
    if: ${{ !cancelled() }}
    name: build-and-test (Summary)
    steps:
      - name: All matrix jobs passed
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Some matrix jobs failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
